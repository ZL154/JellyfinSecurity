<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Two-Factor Authentication — Jellyfin</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #101010;
    color: #e0e0e0;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  .card {
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 40px 36px;
    width: 100%;
    max-width: 400px;
  }

  .logo {
    text-align: center;
    margin-bottom: 8px;
  }

  .logo-text {
    font-size: 28px;
    font-weight: 700;
    color: #00a4dc;
    letter-spacing: 1px;
  }

  .subtitle {
    text-align: center;
    color: #aaa;
    font-size: 14px;
    margin-bottom: 32px;
  }

  .method-tabs {
    display: flex;
    gap: 0;
    margin-bottom: 24px;
    border: 1px solid #444;
    border-radius: 4px;
    overflow: hidden;
  }

  .method-tab {
    flex: 1;
    padding: 9px 12px;
    background: #252525;
    border: none;
    color: #aaa;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    border-right: 1px solid #444;
  }

  .method-tab:last-child { border-right: none; }

  .method-tab.active {
    background: #00a4dc;
    color: #fff;
    font-weight: 600;
  }

  .method-tab:not(.active):hover { background: #2e2e2e; color: #e0e0e0; }

  .form-group { margin-bottom: 20px; }

  label {
    display: block;
    font-size: 13px;
    color: #aaa;
    margin-bottom: 6px;
  }

  .code-input {
    width: 100%;
    padding: 14px 16px;
    background: #252525;
    border: 1px solid #444;
    border-radius: 4px;
    color: #fff;
    font-size: 28px;
    font-family: 'Courier New', Courier, monospace;
    letter-spacing: 10px;
    text-align: center;
    outline: none;
    transition: border-color 0.15s;
  }

  .code-input:focus { border-color: #00a4dc; }

  .code-input::placeholder { letter-spacing: 4px; font-size: 22px; color: #555; }

  .send-email-btn {
    width: 100%;
    padding: 10px;
    background: #252525;
    border: 1px solid #444;
    border-radius: 4px;
    color: #e0e0e0;
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    margin-bottom: 20px;
  }

  .send-email-btn:hover:not(:disabled) { background: #2e2e2e; border-color: #00a4dc; }
  .send-email-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .checkbox-group {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 24px;
    cursor: pointer;
    user-select: none;
  }

  .checkbox-group input[type="checkbox"] {
    width: 16px;
    height: 16px;
    accent-color: #00a4dc;
    cursor: pointer;
  }

  .checkbox-group span { font-size: 13px; color: #aaa; }

  .btn-primary {
    width: 100%;
    padding: 13px;
    background: #00a4dc;
    border: none;
    border-radius: 4px;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .btn-primary:hover:not(:disabled) { background: #0087b3; }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

  .error-msg {
    display: none;
    background: rgba(244, 67, 54, 0.12);
    border: 1px solid rgba(244, 67, 54, 0.4);
    color: #f44336;
    border-radius: 4px;
    padding: 10px 14px;
    font-size: 13px;
    margin-top: 16px;
    text-align: center;
  }

  .success-msg {
    display: none;
    background: rgba(76, 175, 80, 0.12);
    border: 1px solid rgba(76, 175, 80, 0.4);
    color: #4caf50;
    border-radius: 4px;
    padding: 10px 14px;
    font-size: 13px;
    margin-top: 16px;
    text-align: center;
  }

  .spinner {
    width: 18px;
    height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-text">Jellyfin</div>
  </div>
  <div class="subtitle">Two-Factor Authentication</div>

  <div class="method-tabs" id="methodTabs">
    <button class="method-tab active" data-method="totp" onclick="selectMethod('totp')">Authenticator App</button>
    <button class="method-tab" data-method="email" onclick="selectMethod('email')">Email Code</button>
  </div>

  <div id="emailSection" class="hidden">
    <button class="send-email-btn" id="sendEmailBtn" onclick="sendEmailCode()">Send Email Code</button>
  </div>

  <div class="form-group">
    <label for="codeInput">Enter 6-digit code</label>
    <input
      id="codeInput"
      class="code-input"
      type="text"
      inputmode="numeric"
      pattern="[0-9]*"
      maxlength="6"
      placeholder="------"
      autocomplete="one-time-code"
      autofocus
    >
  </div>

  <label class="checkbox-group">
    <input type="checkbox" id="trustDevice">
    <span>Trust this device for 30 days</span>
  </label>

  <button class="btn-primary" id="verifyBtn" onclick="verify()">
    <span class="spinner" id="spinner"></span>
    <span id="verifyBtnText">Verify</span>
  </button>

  <div class="error-msg" id="errorMsg"></div>
  <div class="success-msg" id="successMsg"></div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const challengeToken = params.get('token') || '';
  let selectedMethod = 'totp';

  function selectMethod(method) {
    selectedMethod = method;
    document.querySelectorAll('.method-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.method === method);
    });
    const emailSection = document.getElementById('emailSection');
    if (method === 'email') {
      emailSection.classList.remove('hidden');
    } else {
      emailSection.classList.add('hidden');
    }
    hideMessages();
    document.getElementById('codeInput').focus();
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('successMsg').style.display = 'none';
  }

  function showSuccess(msg) {
    const el = document.getElementById('successMsg');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('errorMsg').style.display = 'none';
  }

  function hideMessages() {
    document.getElementById('errorMsg').style.display = 'none';
    document.getElementById('successMsg').style.display = 'none';
  }

  function setLoading(loading) {
    const btn = document.getElementById('verifyBtn');
    const spinner = document.getElementById('spinner');
    const btnText = document.getElementById('verifyBtnText');
    btn.disabled = loading;
    spinner.style.display = loading ? 'block' : 'none';
    btnText.textContent = loading ? 'Verifying...' : 'Verify';
  }

  async function sendEmailCode() {
    const btn = document.getElementById('sendEmailBtn');
    btn.disabled = true;
    btn.textContent = 'Sending...';
    hideMessages();
    try {
      const res = await fetch('/TwoFactorAuth/Email/Send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ challengeToken })
      });
      if (res.ok) {
        showSuccess('Email code sent. Please check your inbox.');
        btn.textContent = 'Resend Email Code';
        let countdown = 30;
        const interval = setInterval(() => {
          countdown--;
          btn.textContent = `Resend in ${countdown}s`;
          if (countdown <= 0) {
            clearInterval(interval);
            btn.textContent = 'Resend Email Code';
            btn.disabled = false;
          }
        }, 1000);
      } else {
        showError('Failed to send email code. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Send Email Code';
      }
    } catch (e) {
      showError('Network error. Please try again.');
      btn.disabled = false;
      btn.textContent = 'Send Email Code';
    }
  }

  async function verify() {
    const code = document.getElementById('codeInput').value.trim();
    const trustDevice = document.getElementById('trustDevice').checked;
    hideMessages();

    if (!/^\d{6}$/.test(code)) {
      showError('Please enter a valid 6-digit code.');
      return;
    }

    setLoading(true);
    try {
      const res = await fetch('/TwoFactorAuth/Verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          challengeToken,
          code,
          method: selectedMethod,
          trustDevice
        })
      });

      if (res.ok) {
        const data = await res.json().catch(() => ({}));
        showSuccess('Verified! Redirecting...');

        if (data.accessToken) {
          try {
            const existing = JSON.parse(localStorage.getItem('jellyfin_credentials') || '{}');
            if (existing.Servers && existing.Servers.length > 0) {
              existing.Servers[0].AccessToken = data.accessToken;
            }
            localStorage.setItem('jellyfin_credentials', JSON.stringify(existing));
          } catch (e) { /* ignore */ }
        }

        if (data.deviceToken) {
          localStorage.setItem('twofactor_device_token', data.deviceToken);
        }

        setTimeout(() => {
          window.location.href = '/web/index.html';
        }, 800);
      } else if (res.status === 429) {
        showError('Too many attempts. Please wait before trying again.');
        setLoading(false);
      } else if (res.status === 401) {
        showError('Invalid code. Please try again.');
        document.getElementById('codeInput').value = '';
        document.getElementById('codeInput').focus();
        setLoading(false);
      } else {
        showError('Verification failed. Please try again.');
        setLoading(false);
      }
    } catch (e) {
      showError('Network error. Please try again.');
      setLoading(false);
    }
  }

  document.getElementById('codeInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') verify();
  });

  document.getElementById('codeInput').addEventListener('input', (e) => {
    e.target.value = e.target.value.replace(/\D/g, '').slice(0, 6);
  });

  // If token is missing, show an error
  if (!challengeToken) {
    document.getElementById('verifyBtn').disabled = true;
    showError('Invalid or missing challenge token. Please log in again.');
  }
</script>
</body>
</html>
